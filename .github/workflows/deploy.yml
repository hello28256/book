name: 部署书到 GitHub Pages

# 触发时机：推送到 main 分支
on:
  push:
    branches: [main]
  # 允许手动触发
  workflow_dispatch:

# 部署到 GitHub Pages 需要的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 避免同一时间多次部署互相覆盖
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史，便于 lastUpdated 插件使用

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          # 锁 22 而非 20 —— GitHub 已在 deprecate Node 20 runner，
          # Node 22 LTS 稳定且 VitePress 1.6 兼容
          node-version: "22"

      - name: 启用 pnpm（通过 corepack）
        run: corepack enable pnpm
        # package.json 已声明 "packageManager": "pnpm@9.15.0"，
        # corepack 会自动下载对应版本。比 pnpm/action-setup@v4 更稳：
        # 避免 Node 20 runner 上 action setup 偶发 PATH 不生效的坑。

      - name: 缓存 pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 VitePress 站点
        run: pnpm run docs:build
        # 产物路径：docs/.vitepress/dist

      - name: 上传 Pages 工件
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
