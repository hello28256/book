name: 部署书到 GitHub Pages

# 触发时机：推送到 main 分支
on:
  push:
    branches: [main]
  # 允许手动触发
  workflow_dispatch:

# 部署到 GitHub Pages 需要的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 避免同一时间多次部署互相覆盖
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史，配合 git-revision-date-localized 等插件可用

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 缓存 pip 依赖（加速二次构建）
        id: cache-pip
        uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          path: ~/.cache/pip
          restore-keys: |
            mkdocs-material-${{ runner.os }}-

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install "mkdocs-material[imaging]" mkdocs-glightbox
          fi

      - name: 构建站点
        run: mkdocs build --strict
        # --strict: 任何警告都失败，保证站点质量

      - name: 上传 Pages 工件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
