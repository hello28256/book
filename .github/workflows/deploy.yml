name: 部署书到 GitHub Pages

# 触发时机：推送到 main 分支
on:
  push:
    branches: [main]
  # 允许手动触发
  workflow_dispatch:

# 部署到 GitHub Pages 需要的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 避免同一时间多次部署互相覆盖
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # 完整历史，便于 lastUpdated 插件使用

      - name: 装 pnpm
        # setup-node@v5 的 cache: pnpm 只会缓存 pnpm store，
        # 不会自动把 pnpm 加到 PATH。之前依赖 corepack enable
        # 但 setup-node@v5 在 corepack 之前重置过 PATH，pnpm 仍
        # 找不到。改用 pnpm/action-setup 显式装 pnpm 到 PATH。
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 配置 Node.js
        uses: actions/setup-node@v5
        with:
          # 锁 22 而非 20 —— GitHub 已在 deprecate Node 20 runner，
          # Node 22 LTS 稳定且 VitePress 1.6 兼容
          node-version: "22"
          # 缓存 pnpm store (依赖上面 pnpm/action-setup 先把 pnpm 装上)
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 VitePress 站点
        run: pnpm run docs:build
        # 产物路径：docs/.vitepress/dist

      - name: 上传 Pages 工件
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
